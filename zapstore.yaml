# Zapstore publishing configuration
# https://zapstore.dev/docs/publish
#
# After creating this file, run:
#   zsp publish --wizard
# to link your APK signing certificate to your Nostr identity.

app:
  name: Roadstr
  identifier: app.roadstr
  repository: https://github.com/roadstrapp/roadstr-app
  license: AGPL-3.0
  summary: Decentralised navigation with Nostr road events and Lightning zaps
  website: https://github.com/roadstrapp/roadstr-app
  categories:
    - Navigation
    - Maps
  tags:
    - nostr
    - bitcoin
    - lightning
    - navigation
    - openstreetmap
    - privacy

# Your Nostr public key (npub or hex) — set this before publishing
# nostr_pubkey: npub1...

# APK source: local build artifact (generated by build_release.sh)
source:
  type: local
  path: build/app/outputs/flutter-apk/

# Automatic update detection via GitHub releases
# update_check:
#   type: github
#   repo: roadstrapp/roadstr-app
